# Integration-test runner: a disposable Postgres + a one-shot runner that
# applies the versioned migrations and runs the integration suite against it.
# Mirrors the CI job for local reproduction.
#   docker compose -f docker-compose.itest.yml up --build \
#     --abort-on-container-exit --exit-code-from itest-runner
name: erp1-itest

services:
  itest-db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: erp1_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d erp1_test"]
      interval: 3s
      timeout: 3s
      retries: 30

  itest-runner:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@itest-db:5432/erp1_test?schema=public
    depends_on:
      itest-db:
        condition: service_healthy
    command:
      - sh
      - -c
      - pnpm --filter @erp1/db migrate:deploy && pnpm --filter @erp1/api test:integration
