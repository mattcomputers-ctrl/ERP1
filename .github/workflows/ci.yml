name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @erp1/db generate

      - name: Build all packages
        run: pnpm build

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Run unit tests
        run: pnpm test

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: erp1_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d erp1_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/erp1_test?schema=public
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @erp1/db generate

      - name: Apply versioned migrations to the test database
        run: pnpm --filter @erp1/db migrate:deploy

      # A schema.prisma change without a matching migration must fail CI —
      # deploys run `migrate deploy`, so silent drift would break upgrades.
      - name: Fail on schema/migration drift
        run: >-
          pnpm --filter @erp1/db exec prisma migrate diff
          --from-url "$DATABASE_URL"
          --to-schema-datamodel prisma/schema.prisma
          --exit-code

      - name: Run integration tests
        run: pnpm --filter @erp1/api test:integration

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose config
        run: docker compose config -q
      - name: Validate integration-test compose config
        run: docker compose -f docker-compose.itest.yml config -q
      - name: Build images
        run: docker compose build
